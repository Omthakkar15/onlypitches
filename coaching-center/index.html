<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coaching Center | Apex Scholars Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../subpage.css" />
  <style>
    :root { --biz-accent: #4361ee; --biz-primary: #1a2744; }
    body { --accent: #4361ee; }
    .panel::before { background: linear-gradient(90deg, #4361ee, color-mix(in srgb, #4361ee 60%, #1a2744)); }
    .brand-badge { display: inline-flex; align-items: center; gap: .5rem; margin-top: .5rem; padding: .35rem .85rem; border-radius: 100px; background: color-mix(in srgb, #4361ee 12%, transparent); border: 1px solid color-mix(in srgb, #4361ee 30%, transparent); font-size: .82rem; font-weight: 600; color: #1a2744; }
    .brand-mark { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #4361ee; display: grid; place-items: center; font-weight: 700; font-size: .75rem; color: #4361ee; }
    .btn-desc { display: block; font-size: .72rem; font-weight: 500; opacity: .75; margin-top: .15rem; }
    .btn-2d { border-color: color-mix(in srgb, #4361ee 25%, var(--border)); }
    .btn-3d { border-color: color-mix(in srgb, #1a2744 20%, var(--border)); }
  </style>
</head>
<body>
  <div class="panel">
    <div class="top">
      <div class="kicker">Premium Website Suite</div>
      <h1 class="title">Coaching Center</h1>
      <p class="subtitle">Unlock Your Academic Potential</p>
      <div class="brand-badge"><span class="brand-mark">A</span>Apex Scholars Academy</div>
    </div>
    <div class="btn-grid">
      <button class="btn btn-2d" id="btn-2d" type="button">
        2D Site
        <span class="btn-desc">Full premium layout — booking, gallery, offers</span>
      </button>
      <button class="btn btn-3d" id="btn-3d" type="button">
        3D Site
        <span class="btn-desc">Immersive Three.js showcase + globe</span>
      </button>
      <button class="btn" id="btn-crm" type="button">
        CRM
        <span class="btn-desc">Client management portal</span>
      </button>
    </div>
    <button class="back" id="btn-back" type="button">← Back to categories</button>
  </div>
  <script>
    document.getElementById("btn-2d").onclick = () => location.href = "2d-site/index.html";
    document.getElementById("btn-3d").onclick = () => location.href = "3d-site/index.html";
    document.getElementById("btn-crm").onclick = () => location.href = "crm.html";
    document.getElementById("btn-back").onclick = () => location.href = "../index.html";
  </script>
</body>
</html>
