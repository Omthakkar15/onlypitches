<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found (404) | BizBuilder</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="pages/pages.css" />
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 2rem; }
    .err-box { text-align: center; max-width: 440px; }
    .err-code { font-size: 5rem; font-weight: 800; color: #2ca58d; line-height: 1; }
    .err-title { font-size: 1.5rem; font-weight: 700; color: #1e3a5f; margin: 0.75rem 0 0.5rem; }
    .err-desc { color: #64748b; margin-bottom: 1.5rem; line-height: 1.6; }
    .err-links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">404</div>
    <h1 class="err-title">Page not found</h1>
    <p class="err-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="err-links">
      <a href="index.html" class="pg-btn pg-btn-primary">Go Home</a>
      <a href="pages/how-to-build-website.html" class="pg-btn pg-btn-ghost" style="background:#eef1f5;color:#1e3a5f;border:1px solid #dde3ea;">Build a Website</a>
    </div>
  </div>
</body>
</html>
